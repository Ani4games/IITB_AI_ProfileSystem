<!-- ══════════════════════════════════════════════════════════════════
     IITBNF — Voice AI Panel
     Uses: Web Speech API (STT + TTS) — zero server cost
     Included in: profile.html, lab_profile.html
══════════════════════════════════════════════════════════════════ -->

<!-- ── Trigger Bubble ─────────────────────────────────────────────── -->
<button id="ai-bubble" onclick="openAIModal()" aria-label="Open AI Voice Assistant" title="IITBNF AI Assistant">
  <span class="ai-bubble-icon">✦</span>
  <span class="ai-bubble-label">AI Assistant</span>
</button>

<!-- ── Main Modal ─────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="ai-modal" role="dialog" aria-modal="true" aria-label="IITBNF AI Voice Assistant">
  <div class="ai-modal-box">

    <!-- Header -->
    <div class="ai-modal-head">
      <div class="ai-head-left">
        <div class="ai-logo-mark">✦</div>
        <div>
          <div class="ai-modal-title">IITBNF Assistant</div>
          <div class="ai-modal-sub" id="ai-status-line">Ready</div>
        </div>
      </div>
      <div class="ai-head-right">
        <!-- Large Text Toggle -->
        <button class="ai-util-btn" id="ai-large-text-btn" onclick="toggleLargeText()" title="Larger text for easier reading">
          <span style="font-size:1rem;">Aa</span>
        </button>
        <!-- Voice Toggle -->
        <button class="ai-util-btn" id="ai-voice-btn" onclick="toggleVoice()" title="Toggle voice output">
          <span id="ai-voice-icon">🔊</span>
        </button>
        <!-- Close -->
        <button class="ai-modal-close" onclick="closeAIModal()" aria-label="Close assistant">✕</button>
      </div>
    </div>

    <!-- Orb + Quick Action Pills -->
    <div class="ai-orb-zone">

      <div class="ai-orb-wrap">
        <div class="ai-orb" id="ai-orb">
          <div class="ai-orb-core" id="ai-orb-core">✦</div>
        </div>
        <div class="ai-orb-label" id="ai-orb-label">Tap to speak</div>
      </div>

      <!-- Quick Action Pills -->
      <div class="ai-quick-pills">
        <button class="ai-pill" onclick="quickBrief('brief summary', this)">
          <span class="pill-icon">◉</span> Brief
        </button>
        <button class="ai-pill" onclick="quickBrief('executive briefing for management', this)">
          <span class="pill-icon">◈</span> Full Report
        </button>
        <button class="ai-pill" onclick="quickBrief('what is the attendance percentage', this)">
          <span class="pill-icon">▦</span> Attendance
        </button>
        <button class="ai-pill" onclick="quickBrief('list all equipment and tools used', this)">
          <span class="pill-icon">⬡</span> Equipment
        </button>
      </div>

    </div>

    <!-- Output Area -->
    <div class="ai-output-area" id="ai-output-area">
      <div id="ai-output-text" class="ai-output-text">
        <span class="ai-placeholder">Hello. I am ready to brief you on this profile.<br>
        Ask me anything, or choose an option above.</span>
      </div>
      <div id="ai-typing-cursor" class="ai-typing-cursor" style="display:none;">▌</div>
    </div>

    <!-- Mic + Text Input Row -->
    <div class="ai-input-zone">
      <!-- Mic Button -->
      <button class="ai-mic-btn" id="ai-mic-btn" onclick="toggleMic()" title="Hold to speak">
        <span class="ai-mic-icon" id="ai-mic-icon">🎤</span>
      </button>

      <!-- Text Input -->
      <div class="ai-text-input-wrap">
        <input
          type="text"
          id="ai-text-input"
          class="ai-text-input"
          placeholder="Or type your question here…"
          autocomplete="off"
        />
      </div>

      <!-- Send -->
      <button class="ai-send-btn" onclick="sendAIText()" title="Send question">
        <span>↑</span>
      </button>
    </div>

    <!-- Speech support warning (shown only if not supported) -->
    <div id="ai-no-speech-warn" class="ai-no-speech-warn" style="display:none;">
      ⚠ Voice not available in this browser. Text input works normally.
      Use Chrome or Edge for full voice features.
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════════════════ -->
<script>
(function() {
'use strict';

/* ── State ─────────────────────────────────────────────────────── */
let _stream      = null;
let _recognition = null;
let _synth       = window.speechSynthesis || null;
let _utterance   = null;
let _voiceOn     = true;
let _largeText   = false;
let _isListening = false;
let _isSpeaking  = false;
let _speechSupported = false;
let _pendingSpeech  = '';
let _speechQueue    = [];

/* ── DOM refs ────────────────────────────────────────────────────── */
let _orb, _orbLabel, _orbCore, _statusLine,
    _output, _cursor, _micBtn, _micIcon, _outputArea;

/* ── Profile context ─────────────────────────────────────────────── */
function _getProfile() {
  const b = document.body;
  return {
    id:   b.dataset.memberId || b.dataset.memberid || '',
    type: b.dataset.profileType || (location.pathname.startsWith('/lab/') ? 'lab' : 'staff')
  };
}

/* ── Init ────────────────────────────────────────────────────────── */
function _init() {
  _orb        = document.getElementById('ai-orb');
  _orbLabel   = document.getElementById('ai-orb-label');
  _orbCore    = document.getElementById('ai-orb-core');
  _statusLine = document.getElementById('ai-status-line');
  _output     = document.getElementById('ai-output-text');
  _cursor     = document.getElementById('ai-typing-cursor');
  _micBtn     = document.getElementById('ai-mic-btn');
  _micIcon    = document.getElementById('ai-mic-icon');
  _outputArea = document.getElementById('ai-output-area');

  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRec) {
    _speechSupported = true;
    _recognition = new SpeechRec();
    _recognition.lang = 'en-IN';
    _recognition.interimResults = true;
    _recognition.maxAlternatives = 1;
    _setupRecognition();
  } else {
    _speechSupported = false;
    if (_micBtn) _micBtn.classList.add('unsupported');
    const warn = document.getElementById('ai-no-speech-warn');
    if (warn) warn.style.display = 'block';
  }

  const inp = document.getElementById('ai-text-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendAIText(); });

  const modal = document.getElementById('ai-modal');
  if (modal) modal.addEventListener('click', e => { if (e.target === modal) closeAIModal(); });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAIModal(); });

  if (_orb) _orb.addEventListener('click', toggleMic);

  _syncVoiceBtn();
  _loadVoices();
}

/* ── Speech Recognition ─────────────────────────────────────────── */
function _setupRecognition() {
  if (!_recognition) return;

  _recognition.onstart = () => {
    _isListening = true;
    _setOrbState('listening');
    _setStatus('Listening…');
    if (_micBtn) _micBtn.classList.add('active');
    if (_micIcon) _micIcon.textContent = '🛑';
  };

  _recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    const isFinal = e.results[e.results.length - 1].isFinal;
    const inp = document.getElementById('ai-text-input');
    if (inp) inp.value = transcript;
    if (isFinal && transcript.trim()) {
      _recognition.stop();
      _startStream(transcript.trim());
    }
  };

  _recognition.onerror = e => {
    _isListening = false;
    _setOrbState('idle');
    _setStatus('Ready');
    if (_micBtn) _micBtn.classList.remove('active');
    if (_micIcon) _micIcon.textContent = '🎤';
    if (e.error === 'no-speech') _setStatus('No speech detected — try again');
  };

  _recognition.onend = () => {
    _isListening = false;
    if (_micBtn) _micBtn.classList.remove('active');
    if (_micIcon) _micIcon.textContent = '🎤';
    if (!_stream) { _setOrbState('idle'); _setStatus('Ready'); }
  };
}

/* ── Mic toggle ──────────────────────────────────────────────────── */
window.toggleMic = function() {
  if (!_speechSupported) {
    document.getElementById('ai-no-speech-warn').style.display = 'block';
    return;
  }
  if (_isListening) {
    _recognition.stop();
  } else {
    _stopStream();
    _stopSpeaking();
    try { _recognition.start(); } catch(e) {}
  }
};

/* ── Voice output toggle ─────────────────────────────────────────── */
window.toggleVoice = function() {
  _voiceOn = !_voiceOn;
  _syncVoiceBtn();
  if (!_voiceOn) _stopSpeaking();
};
function _syncVoiceBtn() {
  const btn  = document.getElementById('ai-voice-btn');
  const icon = document.getElementById('ai-voice-icon');
  if (!btn || !icon) return;
  icon.textContent = _voiceOn ? '🔊' : '🔇';
  btn.classList.toggle('active', _voiceOn);
  btn.title = _voiceOn ? 'Voice on — click to mute' : 'Voice off — click to unmute';
}

/* ── Large text toggle ───────────────────────────────────────────── */
window.toggleLargeText = function() {
  _largeText = !_largeText;
  const box = document.querySelector('.ai-modal-box');
  if (box) box.classList.toggle('ai-large-text', _largeText);
  const btn = document.getElementById('ai-large-text-btn');
  if (btn) btn.classList.toggle('active', _largeText);
};

/* ── Modal open/close ────────────────────────────────────────────── */
window.openAIModal = function() {
  const modal = document.getElementById('ai-modal');
  if (modal) { modal.classList.add('open'); document.body.style.overflow = 'hidden'; }
};

window.closeAIModal = function() {
  const modal = document.getElementById('ai-modal');
  if (modal) { modal.classList.remove('open'); document.body.style.overflow = ''; }
  _stopStream();
  _stopSpeaking();
  if (_isListening && _recognition) _recognition.stop();
  _setOrbState('idle');
  _setStatus('Ready');
  document.querySelectorAll('.ai-pill').forEach(p => p.classList.remove('active'));
};

/* ── Quick brief pills ───────────────────────────────────────────── */
window.quickBrief = function(phrase, btn) {
  document.querySelectorAll('.ai-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const inp = document.getElementById('ai-text-input');
  if (inp) inp.value = phrase;
  _startStream(phrase);
};

/* ── Text send ───────────────────────────────────────────────────── */
window.sendAIText = function() {
  const inp = document.getElementById('ai-text-input');
  const msg = inp ? inp.value.trim() : '';
  if (!msg) return;
  _startStream(msg);
};

/* ── Core streaming ──────────────────────────────────────────────── */
function _startStream(message) {
  const p = _getProfile();
  if (!p.id) {
    _showOutput('Could not determine profile. Please refresh the page.');
    return;
  }

  _stopStream();
  _stopSpeaking();

  if (_output)  { _output.innerHTML = ''; }
  if (_cursor)  { _cursor.style.display = 'inline'; }
  _pendingSpeech = '';
  _speechQueue   = [];

  _setOrbState('thinking');
  _setStatus('Thinking…');

  const url = `/api/ai/stream?profile_type=${p.type}&profile_id=${p.id}&message=${encodeURIComponent(message)}`;
  _stream = new EventSource(url);

  _stream.onmessage = e => {
    const data = e.data;

    if (data === '[DONE]') {
      if (_cursor) _cursor.style.display = 'none';
      _stopStream();
      if (_pendingSpeech.trim()) _queueSpeak(_pendingSpeech.trim());
      _flushSpeechQueue();
      _setStatus('Done');
      document.querySelectorAll('.ai-pill').forEach(p => p.classList.remove('active'));
      return;
    }

    if (data.startsWith('[ERROR]')) {
      if (_cursor) _cursor.style.display = 'none';
      _showOutput(data);
      _stopStream();
      _setOrbState('idle');
      _setStatus('Error');
      return;
    }

    try {
      const token = JSON.parse(data);
      if (token.startsWith('[MODE:') && token.includes(']')) {
        const modeLabel = token.replace(/\[MODE:\s*/, '').replace(/\].*/, '').trim();
        if (_output) {
          const ph = _output.querySelector('.ai-placeholder');
          if (ph) ph.remove();
          const existing = _output.querySelector('.ai-mode-badge');
          if (existing) existing.remove();
          const badge = document.createElement('span');
          badge.className = 'ai-mode-badge';
          badge.textContent = modeLabel;
          _output.insertBefore(badge, _output.firstChild);
          const br = document.createElement('div');
          br.style.cssText = 'height:.5rem;display:block;';
          _output.insertBefore(br, badge.nextSibling);
        }
        return;
      }
      if (_output) {
        const ph = _output.querySelector('.ai-placeholder');
        if (ph) ph.remove();
        _output.insertBefore(document.createTextNode(token), _cursor);
      }
      if (_outputArea) _outputArea.scrollTop = _outputArea.scrollHeight;

      _pendingSpeech += token;
      const sentenceEnd = _pendingSpeech.search(/[.!?\n]/);
      if (sentenceEnd !== -1) {
        const sentence = _pendingSpeech.slice(0, sentenceEnd + 1).trim();
        _pendingSpeech = _pendingSpeech.slice(sentenceEnd + 1);
        if (sentence.length > 3) _queueSpeak(sentence);
      } else if (_pendingSpeech.length > 80) {
        const commaEnd = _pendingSpeech.lastIndexOf(',');
        if (commaEnd > 20) {
          const clause = _pendingSpeech.slice(0, commaEnd + 1).trim();
          _pendingSpeech = _pendingSpeech.slice(commaEnd + 1);
          if (clause.length > 5) _queueSpeak(clause);
        }
      }
    } catch(err) {}
  };

  _stream.onerror = () => {
    if (_cursor) _cursor.style.display = 'none';
    if (!_output || !_output.textContent.trim()) _showOutput('Connection error. Is the server running?');
    _stopStream();
    _setOrbState('idle');
    _setStatus('Error — check server');
  };
}

function _stopStream() {
  if (_stream) { _stream.close(); _stream = null; }
}

/* ── TTS ─────────────────────────────────────────────────────────── */
let _voiceCache = [];
function _loadVoices() {
  if (!_synth) return;
  const v = _synth.getVoices();
  if (v.length) { _voiceCache = v; return; }
  _synth.addEventListener('voiceschanged', () => {
    _voiceCache = _synth.getVoices();
  }, { once: true });
}

function _pickVoice() {
  if (!_voiceCache.length) _voiceCache = _synth ? _synth.getVoices() : [];
  return _voiceCache.find(v => v.lang.startsWith('en') && v.name.includes('Google'))
      || _voiceCache.find(v => v.lang.startsWith('en') && v.name.includes('Microsoft'))
      || _voiceCache.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
      || _voiceCache.find(v => v.lang.startsWith('en'))
      || _voiceCache[0]
      || null;
}

function _queueSpeak(text) {
  if (!_voiceOn || !_synth) return;
  const t = text.trim();
  if (!t || (t.startsWith('[') && t.endsWith(']'))) return;
  if (t.startsWith('[') && t.includes(':')) return;
  _speechQueue.push(t);
  if (!_isSpeaking) _speakNext();
}

function _flushSpeechQueue() {
  if (!_voiceOn || !_synth || !_speechQueue.length) return;
  if (!_isSpeaking) _speakNext();
}

let _ttsKeepalive = null;
function _startKeepalive() {
  if (_ttsKeepalive) return;
  _ttsKeepalive = setInterval(() => {
    if (_synth && _synth.speaking) { _synth.pause(); _synth.resume(); }
  }, 10000);
}
function _stopKeepalive() {
  if (_ttsKeepalive) { clearInterval(_ttsKeepalive); _ttsKeepalive = null; }
}

function _speakNext() {
  if (!_voiceOn || !_synth || !_speechQueue.length) {
    _isSpeaking = false;
    _stopKeepalive();
    _setOrbState('idle');
    _setStatus('Ready');
    return;
  }
  _isSpeaking = true;
  _startKeepalive();
  _setOrbState('speaking');
  _setStatus('Speaking…');

  const text = _speechQueue.shift();
  _utterance = new SpeechSynthesisUtterance(text);
  _utterance.rate   = 0.90;
  _utterance.pitch  = 1.0;
  _utterance.volume = 1.0;
  _utterance.lang   = 'en-IN';

  const v = _pickVoice();
  if (v) _utterance.voice = v;

  _utterance.onend   = () => { _isSpeaking = false; _speakNext(); };
  _utterance.onerror = (e) => { console.warn('TTS error:', e.error); _isSpeaking = false; _speakNext(); };
  _synth.speak(_utterance);
}

function _stopSpeaking() {
  _speechQueue   = [];
  _pendingSpeech = '';
  _isSpeaking    = false;
  _stopKeepalive();
  if (_synth) { _synth.cancel(); }
}

/* ── Orb state helpers ───────────────────────────────────────────── */
function _setOrbState(state) {
  if (!_orb) return;
  _orb.classList.remove('listening', 'speaking', 'thinking');
  if (state !== 'idle') _orb.classList.add(state);
  const labels = { idle: 'Tap to speak', listening: 'Listening…', speaking: 'Speaking…', thinking: 'Thinking…' };
  if (_orbLabel) _orbLabel.textContent = labels[state] || 'Ready';
  if (_orbCore) {
    const icons = { idle: '✦', listening: '◉', speaking: '▶', thinking: '…' };
    _orbCore.textContent = icons[state] || '✦';
  }
}

function _setStatus(text) {
  if (_statusLine) _statusLine.textContent = text;
}

function _showOutput(text) {
  if (_output) _output.textContent = text;
}

/* ── Boot ────────────────────────────────────────────────────────── */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _init);
} else {
  _init();
}

})();
</script>
