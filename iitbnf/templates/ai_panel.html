<script>
  // ── AI Bubble Picker ──────────────────────────────────────────────
  function toggleAIPicker(e) {
    if (e)  e.stopPropagation();
    const overlay = document.getElementById('ai-picker-overlay');
    if (!overlay) return;
    const isOpen = overlay.classList.toggle('open');
    if (isOpen) {
      setTimeout(() => document.addEventListener('click', _closeAIPicker, { once: true }), 0);
    }
  }
  
  function _closeAIPicker(e) {
  const overlay = document.getElementById('ai-picker-overlay');
  if (!overlay) return;
  // If click was inside picker or on bubble, don't close
  if (e && e.target) {
    if (overlay.contains(e.target)) return;
    const bubble = document.getElementById('ai-bubble');
    if (bubble && bubble.contains(e.target)) return;
  }
  overlay.classList.remove('open');
}
  // ── AI Summary Modal (Brief + Executive) ──────────────────────────
  const _AI_SPEED = {
    short:     { char_base: 16, char_variance: 10, comma_pause: 80,  period_pause: 140, newline_pause: 240 },
    executive: { char_base: 22, char_variance: 14, comma_pause: 100, period_pause: 180, newline_pause: 320 },
  };
  let _aiAnimFrame = null;
  let _aiIsTyping  = false;

  function openAISummaryModal(mode) {
    const overlay = document.getElementById('ai-picker-overlay');
    if (overlay) overlay.classList.remove('open');

    if (mode === 'qa') {
      const greet = document.getElementById('ai-qa-greeting');
      if (greet) {
        const hour = new Date().getHours();
        const tod  = hour < 12 ? 'Morning' : hour < 17 ? 'Afternoon' : 'Evening';
        const user = '{{ session.get("fname", "") }} {{ session.get("lname", "") }}'.trim() || 'there';
        greet.textContent = `Good ${tod}, ${user}`;
      }
      const ans = document.getElementById('ai-qa-answer');
      if (ans) ans.innerHTML = '<span style="color:var(--faint);font-style:italic;font-size:.85rem;">Your answer will appear here…</span>';
      const inp = document.getElementById('ai-qa-input');
      if (inp) inp.value = '';
      _buildProfileChips();   // ← ADD THIS LINE
      const nameEl = document.getElementById('ai-chat-person-name');
      if (nameEl) nameEl.setAttribute('data-name', '');  // triggers data-name update
      openModal('ai-qa-modal');
      setTimeout(() => {
        _buildProfileChips();  // ← also call here as safety
        document.getElementById('ai-qa-input-greeting')?.focus();
      }, 80);
      return;
      openModal('ai-qa-modal');
      setTimeout(() => { if (inp) inp.focus(); }, 200);
      return;
    }

    // 'summary' mode — use the composer (short mode = instant, no LLM)
    const labelEl  = document.getElementById('ai-modal-mode-label');
    const bubbleEl = document.getElementById('ai-summary-bubble');
    const footerEl = document.getElementById('ai-summary-footer');
    if (labelEl)  labelEl.textContent  = 'Profile Summary';
    if (footerEl) footerEl.style.display = 'none';
    if (bubbleEl) bubbleEl.innerHTML = `<div class="ai-summary-idle"><div class="ai-summary-spinner"></div>
                                        <span>Generating…</span></div>`;
    openModal('ai-summary-modal');
    _aiIsTyping = false;
    if (_aiAnimFrame) clearTimeout(_aiAnimFrame);

    // Always use short/composer mode — instant, no LLM required
    _runBriefMode(bubbleEl, footerEl);
  }

  function _aiTypewriter(text, container, footerEl, speed) {
    _aiIsTyping = true;
    container.innerHTML = '';
    const paragraphs = text.split('\n\n').filter(p => p.trim());
    const nodes = [];
    paragraphs.forEach(para => {
      const div = document.createElement('div');
      div.className = 'ai-summary-para';
      div.style.fontFamily = 'var(--font-body)';
      div.style.fontSize   = '1.25rem';
      div.style.lineHeight = '1.8';
      div.style.color      = 'var(--fg)';
      div.style.marginBottom = '.75rem';
      container.appendChild(div);
      nodes.push({ el: div, text: para.trim() });
    });
    const cursor = document.createElement('span');
    cursor.className = 'ai-summary-cursor';
    if (nodes.length > 0) nodes[0].el.appendChild(cursor);

    function charDelay(c) {
      let d = speed.char_base + Math.random() * speed.char_variance;
      if (',;:'.includes(c)) d += speed.comma_pause;
      if ('.!?'.includes(c)) d += speed.period_pause;
      return d;
    }
    function typeNode(node, i, done) {
      if (!node.el.classList.contains('visible')) {
        setTimeout(() => node.el.classList.add('visible'), 50);
      }
      if (i >= node.text.length) { done(); return; }
      const ch = node.text[i];
      _aiAnimFrame = setTimeout(() => {
        if (!_aiIsTyping) return;
        const cur = container.querySelector('.ai-summary-cursor');
        if (cur && cur.parentNode === node.el) node.el.insertBefore(document.createTextNode(ch), cur);
        else node.el.appendChild(document.createTextNode(ch));
        typeNode(node, i + 1, done);
      }, charDelay(ch));
    }
    function typeAll(idx) {
      if (idx >= nodes.length) {
        _aiIsTyping = false;
        const cur = container.querySelector('.ai-summary-cursor');
        if (cur) cur.remove();
        nodes.forEach(n => n.el.classList.add('visible'));
        if (footerEl) footerEl.style.display = 'block';
        return;
      }
      const node = nodes[idx];
      const cur  = container.querySelector('.ai-summary-cursor');
      if (cur) node.el.appendChild(cur);
      const entrancePause = idx === 0 ? 0 : speed.newline_pause;
      setTimeout(() => {
        typeNode(node, 0, () => {
          setTimeout(() => typeAll(idx + 1), idx < nodes.length - 1 ? speed.newline_pause : 0);
        });
      }, entrancePause);
    }
    typeAll(0);
  }

  function _runBriefMode(bubbleEl, footerEl) {
    fetch(`/api/ai/compose?profile_type=${PROFILE_TYPE}&profile_id=${MEMBER_ID}&mode=short`)
      .then(r => {
        const reader = r.body.getReader(), decoder = new TextDecoder();
        let buffer = '';
        function read() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n'); buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const raw = line.slice(6).trim();
              if (raw === '[DONE]') return;
              if (raw.startsWith('[ERROR]')) {
                bubbleEl.innerHTML = `<p style="color:var(--red);font-size:.8rem;">${raw}</p>`; return;
              }
              try {
                const msg = JSON.parse(raw);
                if (msg.type === 'text' && msg.content) {
                  _aiTypewriter(msg.content, bubbleEl, footerEl, _AI_SPEED.short);
                }
              } catch(e) {}
            }
            read();
          });
        }
        read();
      }).catch(e => { bubbleEl.innerHTML = `<p style="color:var(--red);">Error: ${e.message}</p>`; });
  }

  function _runExecutiveMode(bubbleEl, footerEl) {
    let tokenBuffer = '';
    const es = new EventSource(`/api/ai/compose?profile_type=${PROFILE_TYPE}&profile_id=${MEMBER_ID}&mode=executive`);
    es.onmessage = event => {
      const raw = event.data;
      if (raw === '[DONE]') {
        es.close();
        const clean = tokenBuffer.trim().replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6}\s/g,'');
        if (clean) _aiTypewriter(clean, bubbleEl, footerEl, _AI_SPEED.executive);
        else bubbleEl.innerHTML = '<p style="color:var(--red);">No content received.</p>';
        return;
      }
      if (raw.startsWith('[ERROR]')) {
        es.close(); bubbleEl.innerHTML = `<p style="color:var(--red);font-size:.8rem;">${raw}</p>`; return;
      }
      if (raw.startsWith(':') || raw === '') return;
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'token' && msg.content) tokenBuffer += msg.content;
      } catch(_) {}
    };
    es.onerror = () => {
      es.close();
      if (tokenBuffer.trim()) _aiTypewriter(tokenBuffer.trim(), bubbleEl, footerEl, _AI_SPEED.executive);
      else bubbleEl.innerHTML = '<p style="color:var(--red);">Connection error.</p>';
    };
  }

  // ── PROFILE AI CHAT ENGINE ────────────────────────────────────────
  let _pChatMsgs     = [];
  let _pChatStreaming = false;

  // Chips are profile-aware — generated once the person's name is known
  const _PROFILE_CHIPS = {
    staff: [
      { label: '📊 Attendance this year',   q: 'What is the attendance this year?' },
      { label: '⚙ Equipment requests',      q: 'How many equipment requests were submitted?' },
      { label: '🔑 Tool permissions',        q: 'How many tool permissions does this person have?' },
      { label: '📄 Publications',            q: 'How many publications does this person have?' },
      { label: '🗂 Projects',               q: 'What projects is this person associated with?' },
      { label: '🏷 Designation & team',     q: 'What is the designation and team?' },
    ],
    lab: [
      { label: '📅 Slot reservations',      q: 'How many slot reservations have been made?' },
      { label: '⚙ Equipment requests',      q: 'How many equipment requests were submitted?' },
      { label: '🔬 Research area',          q: 'What is the research area?' },
      { label: '👤 Supervisor',             q: 'Who is the supervisor?' },
      { label: '📄 Publications',           q: 'How many publications does this person have?' },
      { label: '🗂 Projects',              q: 'What projects is this person associated with?' },
    ]
  };

function _buildProfileChips() {
    const container = document.getElementById('ai-qa-chips');
    if (!container) return;
    const chips = _PROFILE_CHIPS[PROFILE_TYPE] || _PROFILE_CHIPS.staff;
    container.innerHTML = '';
    chips.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'ai-profile-chip';
        btn.textContent = c.label;
        btn.addEventListener('click', () => _sendProfileChip(c.q));
        container.appendChild(btn);
    });
}

  function _sendProfileChip(q) {
    const inp = document.getElementById('ai-qa-input-greeting');
    if (inp) inp.value = q;
    sendAIQuestion();
  }

  function _renderProfileChatScreen() {
    const greet = document.getElementById('ai-qa-greeting-screen');
    const chat  = document.getElementById('ai-qa-chat-screen');
    if (!greet || !chat) return;
    if (_pChatMsgs.length === 0) {
      greet.style.display = 'flex';
      chat.style.display  = 'none';
    } else {
      greet.style.display = 'none';
      chat.style.display  = 'flex';
      _renderProfileMessages();
    }
  }

  function _renderProfileMessages() {
    const list = document.getElementById('ai-qa-message-list');
    if (!list) return;
    list.innerHTML = '';
    _pChatMsgs.forEach((msg, idx) => {
      const isUser = msg.role === 'user';
      const row = document.createElement('div');
      row.className = `ai-prf-msg-row ${isUser ? 'user' : 'ai'}`;
      const bubbleClass = `ai-prf-bubble ${isUser ? 'user' : 'ai'}${msg.streaming ? ' streaming' : ''}${msg.error ? ' error' : ''}`;
      row.innerHTML = `
        <div class="ai-prf-av ${isUser ? 'user-side' : 'ai-side'}">${isUser ? 'U' : '✦'}</div>
        <div style="display:flex;flex-direction:column;">
          <div class="${bubbleClass}" id="ai-prf-bubble-${idx}">${_pEscape(msg.text)}</div>
          <div class="ai-prf-ts">${msg.ts || ''}</div>
        </div>`;
      list.appendChild(row);
    });
    list.scrollTop = list.scrollHeight;
  }

  function _pEscape(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML.replace(/\n/g, '<br>');
  }

  function _pNow() {
    return new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
  }

  function _pAddMsg(role, text, extra) {
    _pChatMsgs.push({ role, text, ts: _pNow(), ...extra });
    _renderProfileChatScreen();
    return _pChatMsgs.length - 1;
  }

  function _pUpdateBubble(idx, text, done) {
    const b = document.getElementById(`ai-prf-bubble-${idx}`);
    if (b) {
      b.innerHTML = _pEscape(text);
      if (done) b.classList.remove('streaming');
    }
    const list = document.getElementById('ai-qa-message-list');
    if (list) list.scrollTop = list.scrollHeight;
    if (done && _pChatMsgs[idx]) {
      _pChatMsgs[idx].text      = text;
      _pChatMsgs[idx].streaming = false;
    }
  }

  function _clearProfileChat() {
    _pChatMsgs     = [];
    _pChatStreaming = false;
    _renderProfileChatScreen();
    setTimeout(() => document.getElementById('ai-qa-input-greeting')?.focus(), 80);
  }

  function sendAIQuestion() {
    if (_pChatStreaming) return;

    // Pick active input
    const inpG = document.getElementById('ai-qa-input-greeting');
    const inpC = document.getElementById('ai-qa-input-chat');
    const src  = _pChatMsgs.length === 0 ? inpG : inpC;
    const q    = (src ? src.value.trim() : '');
    if (!q) return;
    if (inpG) inpG.value = '';
    if (inpC) inpC.value = '';

    _pAddMsg('user', q);

    const aiIdx = _pAddMsg('ai', '', { streaming: true });
    _pChatStreaming = true;

    // Show typing dots
    const bubble = document.getElementById(`ai-prf-bubble-${aiIdx}`);
    if (bubble) bubble.innerHTML = `<div class="ai-prf-typing"><span></span><span></span><span></span></div>`;

    let full = '', firstToken = true;
    // In sendAIQuestion(), replace the EventSource line:
    const historyToSend = _pChatMsgs.slice(-6).map(m => ({role: m.role, text: m.text}));
    const historyParam = encodeURIComponent(JSON.stringify(historyToSend));
    const es = new EventSource(
      `/api/ai/stream?profile_type=${PROFILE_TYPE}&profile_id=${MEMBER_ID}&message=${encodeURIComponent(q)}&history=${historyParam}`
    );
    es.onmessage = event => {
      const raw = event.data;
      if (raw === '[DONE]') {
        es.close();
        _pChatStreaming = false;
        if (!full) full = '(No response received.)';
        _pUpdateBubble(aiIdx, full, true);
        setTimeout(() => document.getElementById('ai-qa-input-chat')?.focus(), 80);
        return;
      }
      if (raw.startsWith('[ERROR]')) {
        es.close();
        _pChatStreaming = false;
        if (_pChatMsgs[aiIdx]) _pChatMsgs[aiIdx].error = true;
        const b = document.getElementById(`ai-prf-bubble-${aiIdx}`);
        if (b) { b.classList.remove('streaming'); b.classList.add('error'); }
        _pUpdateBubble(aiIdx, 'Something went wrong. Please try again.', true);
        return;
      }
      try {
        const token = JSON.parse(raw);
        if (typeof token === 'string') {
          if (token.startsWith('[MODE:')) return;
          if (firstToken) { full = ''; firstToken = false; }
          full += token;
          _pUpdateBubble(aiIdx, full, false);
        }
      } catch(_) {}
    };

    es.onerror = () => {
      es.close();
      _pChatStreaming = false;
      if (!full) {
        if (_pChatMsgs[aiIdx]) _pChatMsgs[aiIdx].error = true;
        const b = document.getElementById(`ai-prf-bubble-${aiIdx}`);
        if (b) { b.classList.remove('streaming'); b.classList.add('error'); }
        _pUpdateBubble(aiIdx, 'Connection error. Please try again.', true);
      } else {
        _pUpdateBubble(aiIdx, full, true);
      }
    };
  }

  // Q&A send on Enter (kept for legacy inline onkeydown handlers above,
  // but also wired here for safety)
  document.addEventListener('DOMContentLoaded', () => {
    ['ai-qa-input-greeting','ai-qa-input-chat'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('keydown', e => { if (e.key==='Enter') sendAIQuestion(); });
    });
  });
    
  function speakSummary(lang = 'en-IN') {
  const text = document.getElementById('summary-panel-body').innerText;
  if (!text || !window.speechSynthesis) return;
  
  window.speechSynthesis.cancel(); // stop any ongoing speech
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = lang;  // 'hi-IN', 'mr-IN', 'ta-IN', 'en-IN', etc.
  utterance.rate = 0.85;
  
  window.speechSynthesis.speak(utterance);
}
</script>
<script type="module">
/* ── Whisper.js local speech recognition ──────────────────────────
   Uses @xenova/transformers running entirely in-browser via ONNX.
   No internet required after first load. No HTTPS required.
   Model: Whisper tiny (~40MB, downloads once, cached in IndexedDB)
──────────────────────────────────────────────────────────────────── */
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

let _whisperPipe   = null;
let _whisperReady  = false;
let _isRecording   = false;
let _mediaRecorder = null;
let _audioChunks   = [];
let _loadPromise   = null;

// Pre-load model in background so first click is fast
async function _loadWhisper() {
  if (_whisperPipe) return _whisperPipe;
  if (_loadPromise)  return _loadPromise;

  _loadPromise = pipeline(
    'automatic-speech-recognition',
    'Xenova/whisper-medium',           // ~460MB, fast on CPU
    {
      progress_callback: (p) => {
        if (p.status === 'downloading') {
          _setVoiceBtnLabel(`⬇ ${Math.round(p.progress || 0)}%`);
        }
      }
    }
  );

  try {
    _whisperPipe  = await _loadPromise;
    _whisperReady = true;
    _setVoiceBtnLabel('🎤');
    console.log('[Whisper] Model ready');
  } catch(e) {
    console.error('[Whisper] Load failed:', e);
    _setVoiceBtnLabel('🎤✗');
  }
  return _whisperPipe;
}

function _setVoiceBtnLabel(text) {
  document.querySelectorAll('.ai-voice-btn').forEach(b => b.textContent = text);
}

function _getActiveInput() {
  const greetingScreen = document.getElementById('ai-qa-greeting-screen');
  const isGreeting = greetingScreen && greetingScreen.style.display !== 'none';
  return isGreeting
    ? document.getElementById('ai-qa-input-greeting')
    : document.getElementById('ai-qa-input-chat');
}

// Replace startWhisperVoice() with this improved version
async function startWhisperVoice() {
    if (_isRecording) {
        _mediaRecorder?.stop();
        return;
    }

    if (!_whisperReady) {
        _setVoiceBtnLabel('⏳ Loading…');
        await _loadWhisper();
        if (!_whisperReady) {
            alert('Speech model failed to load. Please type your question.');
            _setVoiceBtnLabel('🎤');
            return;
        }
    }

    let stream;
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
                  echoCancellation: true,
                  noiseSuppression: true,
                  autoGainControl: true,   // ADD THIS — normalizes quiet voices
                  sampleRate: { ideal: 16000 },  // hint, not guarantee
                  channelCount: 1,              // mono — Whisper doesn't need stereo
              }
        });
    } catch(e) {
        alert('Microphone access denied.');
        return;
    }

    _isRecording  = true;
    _audioChunks  = [];
    _setVoiceBtnLabel('🔴 Stop');
    
    // ADD: visual countdown so user knows when to stop
    const input = _getActiveInput();
    if (input) {
        input.placeholder = 'Recording… speak clearly, then click 🔴 Stop';
        input.style.borderColor = '#38bdf8';
    }

    // ADD: auto-stop after 10 seconds to prevent long noise recordings
    const autoStopTimer = setTimeout(() => {
        if (_isRecording && _mediaRecorder?.state === 'recording') {
            _mediaRecorder.stop();
        }
    }, 10000);

    _mediaRecorder = new MediaRecorder(stream, {
        mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
                  ? 'audio/webm;codecs=opus' 
                  : 'audio/webm'
    });
    
    _mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) _audioChunks.push(e.data);
    };

    _mediaRecorder.onstop = async () => {
        clearTimeout(autoStopTimer);
        _isRecording = false;
        _setVoiceBtnLabel('⏳ Processing…');
        stream.getTracks().forEach(t => t.stop());

        if (input) {
            input.placeholder = 'Transcribing…';
            input.style.borderColor = '';
        }

        // ADD: minimum audio length check — reject very short clips (likely noise)
        const totalSize = _audioChunks.reduce((s, c) => s + c.size, 0);
        if (totalSize < 1000) {  // less than ~1KB = basically silence
            _setVoiceBtnLabel('🎤');
            if (input) input.placeholder = _getPlaceholder();
            return;
        }

        try {
            const blob    = new Blob(_audioChunks, { type: 'audio/webm' });
            const arrBuf  = await blob.arrayBuffer();
            const float32 = await _decodeAudio(arrBuf);

            // ADD: check audio has enough energy (not just silence)
            const rms = Math.sqrt(float32.reduce((s, v) => s + v*v, 0) / float32.length);
            if (rms < 0.005) {  // silence threshold
                console.log('[Whisper] Audio too quiet, skipping transcription');
                _setVoiceBtnLabel('🎤');
                if (input) input.placeholder = _getPlaceholder();
                return;
            }

            const result  = await _whisperPipe(float32, {
                language:                    'english',
                task:                        'transcribe',
                initial_prompt: 'IITBNF equipment names: PECVD, LPCVD, RIE, AFM, SEM, XRD. Staff names and member IDs.',
                chunk_length_s:              30,
                return_timestamps:           false,
                condition_on_prev_tokens:    true,
                compression_ratio_threshold: 1.5,
                no_speech_threshold:         0.3,
            });

            const text = result.text?.trim();
            
            // ADD: sanity check — reject suspiciously short or nonsensical results
            if (text && text.length > 2 && !_looksLikeHallucination(text)) {
                if (input) {
                    input.value = text;
                    input.focus();
                    setTimeout(() => {
                        if (input.value.trim()) sendAIQuestion();
                    }, 1500);
                }
            } else {
                console.log('[Whisper] Rejected transcription:', text);
            }
        } catch(e) {
            console.error('[Whisper] Transcription failed:', e);
        } finally {
            _setVoiceBtnLabel('🎤');
            if (input) input.placeholder = _getPlaceholder();
        }
    };

    _mediaRecorder.start();
}

// ADD: simple hallucination detector
function _looksLikeHallucination(text) {
    // Common Whisper hallucination patterns on silence/noise
    const hallucinations = [
        /thank you for (watching|listening)/i,
        /i am sure this is not/i,
        /please subscribe/i,
        /^\s*\.\s*$/,                    // just a period
        /subbed by/i,
        /subtitles by/i,
        /www\./i,
        /copyright/i,
    ];
    return hallucinations.some(p => p.test(text));
}

function _getPlaceholder() {
  const gs = document.getElementById('ai-qa-greeting-screen');
  return (gs && gs.style.display !== 'none')
    ? 'Ask anything about this profile…'
    : 'Ask another question…';
}

async function _decodeAudio(arrayBuffer) {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  const decoded  = await audioCtx.decodeAudioData(arrayBuffer);
  const channel  = decoded.getChannelData(0);
  audioCtx.close();
  return channel;
}

// Wire up all voice buttons
function _attachWhisperButtons() {
  document.querySelectorAll('.ai-voice-btn').forEach(btn => {
    const fresh = btn.cloneNode(true);
    btn.parentNode.replaceChild(fresh, btn);
    fresh.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      startWhisperVoice();
    });
  });
}

// Init
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    _attachWhisperButtons();
    setTimeout(_loadWhisper, 3000);  // pre-load 3s after page ready
  });
} else {
  _attachWhisperButtons();
  setTimeout(_loadWhisper, 3000);
}

// Expose for manual testing
window.testWhisper = startWhisperVoice;
</script>
