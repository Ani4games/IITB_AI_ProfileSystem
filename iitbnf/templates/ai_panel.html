<script>
  // ── AI Bubble Picker ──────────────────────────────────────────────
  function toggleAIPicker(e) {
    if (e)  e.stopPropagation();
    const overlay = document.getElementById('ai-picker-overlay');
    if (!overlay) return;
    const isOpen = overlay.classList.toggle('open');
    if (isOpen) {
      setTimeout(() => document.addEventListener('click', _closeAIPicker, { once: true }), 0);
    }
  }
  
  function _closeAIPicker(e) {
  const overlay = document.getElementById('ai-picker-overlay');
  if (!overlay) return;
  // If click was inside picker or on bubble, don't close
  if (e && e.target) {
    if (overlay.contains(e.target)) return;
    const bubble = document.getElementById('ai-bubble');
    if (bubble && bubble.contains(e.target)) return;
  }
  overlay.classList.remove('open');
}
  // ── AI Summary Modal (Brief + Executive) ──────────────────────────
  const _AI_SPEED = {
    short:     { char_base: 16, char_variance: 10, comma_pause: 80,  period_pause: 140, newline_pause: 240 },
    executive: { char_base: 22, char_variance: 14, comma_pause: 100, period_pause: 180, newline_pause: 320 },
  };
  let _aiAnimFrame = null;
  let _aiIsTyping  = false;

  function openAISummaryModal(mode) {
    const overlay = document.getElementById('ai-picker-overlay');
    if (overlay) overlay.classList.remove('open');

    if (mode === 'qa') {
      const greet = document.getElementById('ai-qa-greeting');
      if (greet) {
        const hour = new Date().getHours();
        const tod  = hour < 12 ? 'Morning' : hour < 17 ? 'Afternoon' : 'Evening';
        const user = '{{ session.get("fname", "") }} {{ session.get("lname", "") }}'.trim() || 'there';
        greet.textContent = `Good ${tod}, ${user}`;
      }
      const ans = document.getElementById('ai-qa-answer');
      if (ans) ans.innerHTML = '<span style="color:var(--faint);font-style:italic;font-size:.85rem;">Your answer will appear here…</span>';
      const inp = document.getElementById('ai-qa-input');
      if (inp) inp.value = '';
      openModal('ai-qa-modal');
      setTimeout(() => { if (inp) inp.focus(); }, 200);
      return;
    }

    // 'summary' mode — use the composer (short mode = instant, no LLM)
    const labelEl  = document.getElementById('ai-modal-mode-label');
    const bubbleEl = document.getElementById('ai-summary-bubble');
    const footerEl = document.getElementById('ai-summary-footer');
    if (labelEl)  labelEl.textContent  = 'Profile Summary';
    if (footerEl) footerEl.style.display = 'none';
    if (bubbleEl) bubbleEl.innerHTML = `<div class="ai-summary-idle"><div class="ai-summary-spinner"></div>
                                        <span>Generating…</span></div>`;
    openModal('ai-summary-modal');
    _aiIsTyping = false;
    if (_aiAnimFrame) clearTimeout(_aiAnimFrame);

    // Always use short/composer mode — instant, no LLM required
    _runBriefMode(bubbleEl, footerEl);
  }

  function _aiTypewriter(text, container, footerEl, speed) {
    _aiIsTyping = true;
    container.innerHTML = '';
    const paragraphs = text.split('\n\n').filter(p => p.trim());
    const nodes = [];
    paragraphs.forEach(para => {
      const div = document.createElement('div');
      div.className = 'ai-summary-para';
      div.style.fontFamily = 'var(--font-body)';
      div.style.fontSize   = '.88rem';
      div.style.lineHeight = '1.8';
      div.style.color      = 'var(--fg)';
      div.style.marginBottom = '.75rem';
      container.appendChild(div);
      nodes.push({ el: div, text: para.trim() });
    });
    const cursor = document.createElement('span');
    cursor.className = 'ai-summary-cursor';
    if (nodes.length > 0) nodes[0].el.appendChild(cursor);

    function charDelay(c) {
      let d = speed.char_base + Math.random() * speed.char_variance;
      if (',;:'.includes(c)) d += speed.comma_pause;
      if ('.!?'.includes(c)) d += speed.period_pause;
      return d;
    }
    function typeNode(node, i, done) {
      if (!node.el.classList.contains('visible')) {
        setTimeout(() => node.el.classList.add('visible'), 50);
      }
      if (i >= node.text.length) { done(); return; }
      const ch = node.text[i];
      _aiAnimFrame = setTimeout(() => {
        if (!_aiIsTyping) return;
        const cur = container.querySelector('.ai-summary-cursor');
        if (cur && cur.parentNode === node.el) node.el.insertBefore(document.createTextNode(ch), cur);
        else node.el.appendChild(document.createTextNode(ch));
        typeNode(node, i + 1, done);
      }, charDelay(ch));
    }
    function typeAll(idx) {
      if (idx >= nodes.length) {
        _aiIsTyping = false;
        const cur = container.querySelector('.ai-summary-cursor');
        if (cur) cur.remove();
        nodes.forEach(n => n.el.classList.add('visible'));
        if (footerEl) footerEl.style.display = 'block';
        return;
      }
      const node = nodes[idx];
      const cur  = container.querySelector('.ai-summary-cursor');
      if (cur) node.el.appendChild(cur);
      const entrancePause = idx === 0 ? 0 : speed.newline_pause;
      setTimeout(() => {
        typeNode(node, 0, () => {
          setTimeout(() => typeAll(idx + 1), idx < nodes.length - 1 ? speed.newline_pause : 0);
        });
      }, entrancePause);
    }
    typeAll(0);
  }

  function _runBriefMode(bubbleEl, footerEl) {
    fetch(`/api/ai/compose?profile_type=${PROFILE_TYPE}&profile_id=${MEMBER_ID}&mode=short`)
      .then(r => {
        const reader = r.body.getReader(), decoder = new TextDecoder();
        let buffer = '';
        function read() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n'); buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const raw = line.slice(6).trim();
              if (raw === '[DONE]') return;
              if (raw.startsWith('[ERROR]')) {
                bubbleEl.innerHTML = `<p style="color:var(--red);font-size:.8rem;">${raw}</p>`; return;
              }
              try {
                const msg = JSON.parse(raw);
                if (msg.type === 'text' && msg.content) {
                  _aiTypewriter(msg.content, bubbleEl, footerEl, _AI_SPEED.short);
                }
              } catch(e) {}
            }
            read();
          });
        }
        read();
      }).catch(e => { bubbleEl.innerHTML = `<p style="color:var(--red);">Error: ${e.message}</p>`; });
  }

  function _runExecutiveMode(bubbleEl, footerEl) {
    let tokenBuffer = '';
    const es = new EventSource(`/api/ai/compose?profile_type=${PROFILE_TYPE}&profile_id=${MEMBER_ID}&mode=executive`);
    es.onmessage = event => {
      const raw = event.data;
      if (raw === '[DONE]') {
        es.close();
        const clean = tokenBuffer.trim().replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6}\s/g,'');
        if (clean) _aiTypewriter(clean, bubbleEl, footerEl, _AI_SPEED.executive);
        else bubbleEl.innerHTML = '<p style="color:var(--red);">No content received.</p>';
        return;
      }
      if (raw.startsWith('[ERROR]')) {
        es.close(); bubbleEl.innerHTML = `<p style="color:var(--red);font-size:.8rem;">${raw}</p>`; return;
      }
      if (raw.startsWith(':') || raw === '') return;
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'token' && msg.content) tokenBuffer += msg.content;
      } catch(_) {}
    };
    es.onerror = () => {
      es.close();
      if (tokenBuffer.trim()) _aiTypewriter(tokenBuffer.trim(), bubbleEl, footerEl, _AI_SPEED.executive);
      else bubbleEl.innerHTML = '<p style="color:var(--red);">Connection error.</p>';
    };
  }

  // ── AI Q&A ────────────────────────────────────────────────────────
  let _qaTyping = false;
  let _qaFrame  = null;

  function sendAIQuestion() {
    const inp = document.getElementById('ai-qa-input');
    const ans = document.getElementById('ai-qa-answer');
    if (!inp || !ans) return;
    const q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    ans.innerHTML = `<div class="ai-summary-idle"><div class="ai-summary-spinner"></div><span>Thinking…</span></div>`;
    _qaTyping = false;
    if (_qaFrame) clearTimeout(_qaFrame);

    const es = new EventSource(
      `/api/ai/stream?profile_type=${PROFILE_TYPE}&profile_id=${MEMBER_ID}&message=${encodeURIComponent(q)}`
    );
    let fullText = '';
    es.onmessage = event => {
      const raw = event.data;
      if (raw === '[DONE]') { es.close(); return; }
      if (raw.startsWith('[ERROR]')) {
        es.close(); ans.innerHTML = `<p style="color:var(--red);font-size:.82rem;">${raw}</p>`; return;
      }
      try {
        const token = JSON.parse(raw);
        if (typeof token === 'string' && !token.startsWith('[MODE:')) {
          if (!fullText) ans.innerHTML = '';
          fullText += token;
          // Simple typewriter — append chars directly for Q&A speed
          ans.textContent = fullText;
        }
      } catch(_) {}
    };
    es.onerror = () => { es.close(); if (!fullText) ans.innerHTML = '<p style="color:var(--red);">Connection error.</p>'; };
  }

  // Q&A send on Enter
  document.addEventListener('DOMContentLoaded', () => {
    const inp = document.getElementById('ai-qa-input');
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendAIQuestion(); });
  });
    const SPEED = {
      short:     { char_base:16, char_variance:10, comma_pause:80, period_pause:140, newline_pause:240, word_end:6 },
      executive: { char_base:22, char_variance:14, comma_pause:100, period_pause:180, newline_pause:320, word_end:8 },
    };
    let _mode='short', _animFrame=null, _currentText='', _isTyping=false, _tokenBuffer='';

    const outputEl = () => document.getElementById('about-body');
    const footerEl = () => document.getElementById('about-footer');
    const badgeDot = () => document.getElementById('ai-badge-dot');
    const copyBtn  = () => document.getElementById('about-copy-btn');

    function spd() { return SPEED[_mode]||SPEED.short; }
    function rand(a,b){ return Math.random()*(b-a)+a; }
    function charDelay(c){
      let d=spd().char_base+rand(0,spd().char_variance);
      if(',;:'.includes(c)) d+=spd().comma_pause;
      if('.!?'.includes(c)) d+=spd().period_pause;
      if(c===' ') d+=spd().word_end;
      return d;
    }
    function setBadge(state){
      const dot=badgeDot(); if(!dot) return;
      dot.className=state==='generating'?'ai-badge-dot pulsing':state==='done'?'ai-badge-dot done':'ai-badge-dot';
    }
    function setFooter(text){
      const f=footerEl(); if(!f) return;
      const words=text.split(/\s+/).filter(Boolean).length;
      const wc=document.getElementById('about-word-count');
      if(wc)wc.textContent=`${words} words`;
      f.style.display='flex';
    }
    function showIdle(msg){
      const o=outputEl(); if(!o) return;
      o.innerHTML=`<div class="about-idle"><div class="about-idle-icon">◈</div><div class="about-idle-text">${msg}</div></div>`;
    }
    function buildParagraphNodes(text){
      const o=outputEl(); if(!o) return [];
      o.innerHTML='';
      if(_mode==='executive'){
        const b=document.createElement('div'); b.className='ai-executive-badge';
        b.textContent='◈ Executive Summary · AI Generated'; o.appendChild(b);
      }
      const paragraphs=text.split('\n\n').filter(p=>p.trim());
      const nodes=[];
      paragraphs.forEach(para=>{
        const div=document.createElement('div'); div.className='about-para'; o.appendChild(div);
        nodes.push({el:div,text:para.trim()});
      });
      const cursor=document.createElement('span'); cursor.className='about-cursor'; cursor.id='about-cursor';
      if(nodes.length>0) nodes[0].el.appendChild(cursor);
      return nodes;
    }
    function typeIntoNode(node,charIndex,onComplete){
      if(!node.el.classList.contains('visible')) setTimeout(()=>node.el.classList.add('visible'),50);
      if(charIndex>=node.text.length){onComplete();return;}
      const char=node.text[charIndex];
      _animFrame=setTimeout(()=>{
        if(!_isTyping) return;
        const cursor=document.getElementById('about-cursor');
        if(cursor&&cursor.parentNode===node.el) node.el.insertBefore(document.createTextNode(char),cursor);
        else node.el.appendChild(document.createTextNode(char));
        typeIntoNode(node,charIndex+1,onComplete);
      },charDelay(char));
    }
    function typeSequentially(nodes,nodeIndex,onAllDone){
      if(nodeIndex>=nodes.length){onAllDone();return;}
      const node=nodes[nodeIndex],cursor=document.getElementById('about-cursor');
      if(cursor) node.el.appendChild(cursor);
      setTimeout(()=>{
        typeIntoNode(node,0,()=>{setTimeout(()=>typeSequentially(nodes,nodeIndex+1,onAllDone),nodeIndex<nodes.length-1?spd().newline_pause:0);});
      },nodeIndex===0?0:spd().newline_pause);
    }
    function _startTypewriter(text){
      _isTyping=true; _currentText=text;
      const nodes=buildParagraphNodes(text); if(!nodes.length){setBadge('done');return;}
      typeSequentially(nodes,0,()=>{
        _isTyping=false;
        const cursor=document.getElementById('about-cursor'); if(cursor)cursor.remove();
        document.querySelectorAll('.about-para').forEach(p=>p.classList.add('visible'));
        setBadge('done'); setFooter(text);
        const cb=copyBtn(); if(cb)cb.style.display='inline-flex';
      });
    }
    function runShortMode(){
      showIdle('Generating profile summary…'); setBadge('generating');
      const f=footerEl(); if(f)f.style.display='none';
      const cb=copyBtn(); if(cb)cb.style.display='none';
      fetch(`/api/ai/compose?profile_type=${PROFILE_TYPE}&profile_id=${PROFILE_ID}&mode=short`)
        .then(r=>{
          const reader=r.body.getReader(),decoder=new TextDecoder();let buffer='';
          function read(){reader.read().then(({done,value})=>{
            if(done) return;
            buffer+=decoder.decode(value,{stream:true});
            const lines=buffer.split('\n'); buffer=lines.pop();
            for(const line of lines){
              if(!line.startsWith('data: ')) continue;
              const raw=line.slice(6).trim();
              if(raw==='[DONE]') return;
              if(raw.startsWith('[ERROR]')){const o=outputEl();if(o)o.innerHTML=`<p style="color:var(--red);font-size:.8rem;">${raw}</p>`;setBadge('idle');return;}
              try{const msg=JSON.parse(raw);if(msg.type==='text'&&msg.content)_startTypewriter(msg.content);}catch(e){}
            }
            read();
          });}
          read();
        }).catch(e=>{const o=outputEl();if(o)o.innerHTML=`<p style="color:var(--red);">Error: ${e.message}</p>`;setBadge('idle');});
    }
    function runExecutiveMode(){
      _tokenBuffer=''; setBadge('generating');
      const f=footerEl(); if(f)f.style.display='none';
      const cb=copyBtn(); if(cb)cb.style.display='none';
      const o=outputEl(); if(o)o.innerHTML=`<div class="about-idle"><div class="about-idle-icon" style="animation:about-pulse 1s ease-in-out infinite;">◈</div><div class="about-idle-text" id="about-loading-msg">Connecting to AI model…</div></div>`;
      const es=new EventSource(`/api/ai/compose?profile_type=${PROFILE_TYPE}&profile_id=${PROFILE_ID}&mode=executive`);
      es.onmessage=event=>{
        const raw=event.data;
        if(raw==='[DONE]'){es.close();const clean=_tokenBuffer.trim().replace(/\*\*/g,'').replace(/\*/g,'').replace(/#{1,6}\s/g,'');if(clean)_startTypewriter(clean);else{const out=outputEl();if(out)out.innerHTML='<p style="color:var(--red);">No content received.</p>';setBadge('idle');}return;}
        if(raw.startsWith('[ERROR]')){es.close();const out=outputEl();if(out)out.innerHTML=`<p style="color:var(--red);font-size:.8rem;">${raw}</p>`;setBadge('idle');return;}
        if(raw.startsWith(':')||raw==='') return;
        try{const msg=JSON.parse(raw);if(msg.type==='token'&&msg.content){_tokenBuffer+=msg.content;const lm=document.getElementById('about-loading-msg');if(lm)lm.textContent=`Writing… ${_tokenBuffer.split(/\s+/).filter(Boolean).length} words`;}}catch(_){}
      };
      es.onerror=()=>{es.close();if(_tokenBuffer.trim())_startTypewriter(_tokenBuffer.trim());else{const o=outputEl();if(o)o.innerHTML='<p style="color:var(--red);">Connection error. Is Ollama running?</p>';setBadge('idle');}};
    }

    window.startAbout = function(){
      _isTyping=false; _tokenBuffer=''; _currentText='';
      if(_animFrame) clearTimeout(_animFrame);
      _mode==='short' ? runShortMode() : runExecutiveMode();
    };
    window.setAboutMode = function(mode){
      _mode=mode;
      document.querySelectorAll('.about-mode-btn').forEach(b=>{
        b.classList.toggle('active', b.id===`btn-mode-${mode}`);
      });
      _currentText=''; startAbout();
    };
    window.copyAbout = function(){
      const text=_currentText||_tokenBuffer; if(!text) return;
      navigator.clipboard.writeText(text).then(()=>{
        const cb=copyBtn(); if(!cb) return;
        const orig=cb.textContent; cb.textContent='✓ Copied';
        setTimeout(()=>{cb.textContent=orig;},1800);
      });
    };

    // Auto-start on load
    requestAnimationFrame(()=>setTimeout(startAbout, 300));
</script>
