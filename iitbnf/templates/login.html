<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | IITBNF</title>
  <meta name="description" content="Sign in to the IITBNF Personnel Profiling System using your slotbooking credentials.">
  <meta name="author" content="IIT Bombay Nanofabrication Facility">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <style>
    /* Glassmorphism Styles - Inlined for clarity, move to style.css if preferred */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body.login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.4;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    /* Blurred shape blobs */
    .shape-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #3b82f6, #1e40af);
      top: -150px;
      left: -100px;
      animation: floatBlob 18s ease-in-out infinite;
    }

    .blob-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #8b5cf6, #6d28d9);
      bottom: -150px;
      right: -100px;
      animation: floatBlob 22s ease-in-out infinite reverse;
    }

    .blob-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #06b6d4, #0891b2);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: floatBlob 25s ease-in-out infinite;
      opacity: 0.3;
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(30px, 20px) scale(1.05);
      }
    }

    /* Main container */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 20px;
    }

    /* Glassmorphic Card */
    .login-card {
      background: rgba(10, 15, 28, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 44px 36px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 55px rgba(0, 0, 0, 0.35);
    }

    /* Logo Section */
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-mark {
      font-size: 42px;
      font-weight: 500;
      background: linear-gradient(135deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: 'Space Mono', monospace;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .login-title {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .login-sub {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* Form Elements */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .form-input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 15px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.8);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    /* Button - Solid for affordance */
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border: none;
      border-radius: 40px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(109, 40, 217, 0.35);
      font-family: 'DM Sans', sans-serif;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #9b6ef7, #7c3aed);
      box-shadow: 0 6px 20px rgba(109, 40, 217, 0.45);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-full {
      width: 100%;
    }

    /* Error & Flash Messages */
    .login-error,
    .login-flash {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .login-error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    .login-flash-success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #bbf7d0;
    }

    .login-flash-error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .login-footer a {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: #a78bfa;
    }

    /* Theme Toggle Button (if you add one) */
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 40px;
      padding: 8px 18px;
      font-size: 13px;
      color: white;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(139, 92, 246, 0.5);
    }

    /* Responsive */
    @media (max-width: 520px) {
      .login-wrap {
        padding: 16px;
      }
      
      .login-card {
        padding: 32px 24px;
      }
      
      .login-title {
        font-size: 28px;
      }
      
      .logo-text {
        font-size: 24px;
      }
      
      .logo-mark {
        font-size: 36px;
      }
    }

    /* Light Theme Support (optional) */
    [data-theme="light"] body.login-page {
      background: radial-gradient(circle at 20% 30%, #f0f4ff, #e6e9f0);
    }
    
    [data-theme="light"] .login-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    [data-theme="light"] .login-title,
    [data-theme="light"] .form-label {
      color: #1a1f2e;
    }
    
    [data-theme="light"] .login-sub {
      color: rgba(0, 0, 0, 0.6);
    }
    
    [data-theme="light"] .form-input {
      background: rgba(0, 0, 0, 0.05);
      border-color: rgba(0, 0, 0, 0.15);
      color: #1a1f2e;
    }
    
    [data-theme="light"] .form-input::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }
  </style>

  <script>
    (function() {
      const t = localStorage.getItem('iitbnf_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body class="login-page">
  <!-- Animated background blobs -->
  <div class="shape-blob blob-1"></div>
  <div class="shape-blob blob-2"></div>
  <div class="shape-blob blob-3"></div>
  <div class="grid-bg"></div>
  <div class="grain"></div>

  <main class="login-wrap" id="main-content" role="main">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-mark">⬡</span>
        <span class="logo-text">IITBNF</span>
      </div>
      <h1 class="login-title">Sign In</h1>
      <p class="login-sub">Use your slotbooking credentials to continue.</p>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="login-flash login-flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="/login" class="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" name="email" id="email" class="form-input"
                 placeholder="you@iitb.ac.in" required autocomplete="email" aria-required="true">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" name="password" id="password" class="form-input"
                 placeholder="••••••••" required autocomplete="current-password" aria-required="true">
        </div>
        <button type="submit" class="btn-primary btn-full" aria-label="Sign in to IITBNF">Sign In →</button>
      </form>

      <p class="login-footer">
        <a href="/">← Back to home</a>
      </p>
    </div>
  </main>

  <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()">Light Mode</button>

  <script>
    // ── Theme toggle ──────────────────────────────────────────
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('iitbnf_theme', next);
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = next === 'dark' ? 'Light Mode' : 'Dark Mode';
    }
    // Set correct label on load
    (function() {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent =
        document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light Mode' : 'Dark Mode';
    })();
  </script>
</body>
</html>
